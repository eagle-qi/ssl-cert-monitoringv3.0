# Blackbox Exporter Configuration
# Save this to: exporter/blackbox.yml

modules:
  http_ssl_cert:
    prober: http
    timeout: 10s
    http:
      method: GET
      preferred_ip_protocol: "ip4"
      tls_config:
        insecure_skip_verify: true
      valid_status_codes:
        - 200
        - 301
        - 302
        - 303
        - 307
      no_follow_redirects: false

  https:
    prober: http
    timeout: 10s
    http:
      method: GET
      preferred_ip_protocol: "ip4"
      tls_config:
        insecure_skip_verify: true

  tcp_ssl:
    prober: tcp
    timeout: 10s
    tcp:
      tls: true
      tls_config:
        insecure_skip_verify: true
