      #     severity: warning
      #     alert_type: ssl_cert_agent
      #   annotations:
      #     summary: "SSL证书监控 Agent 离线 - {{ $labels.hostname }}"
      #     description: "Agent {{ $labels.hostname }} ({{ $labels.ip }}) 已离线或无法访问，请检查 Agent 服务状态"
      #     owner: "{{ $labels.owner }}"

