# Prometheus Configuration for SSL Certificate Monitoring

global:
  scrape_interval: 180s
  evaluation_interval: 60s
  scrape_timeout: 120s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - ssl-alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "ssl_cert_alerts.yml"

# Scrape configurations
scrape_configs:
  # Blackbox Exporter - 使用 file_sd 自动发现目标
  # 注意：Prometheus会每30秒自动检查配置更新
  - job_name: 'ssl-blackbox'
    metrics_path: /probe
    params:
      module: [http_ssl_cert]
    file_sd_configs:
      - files:
          - '/etc/prometheus/ssl_targets.json'  # Prometheus targets 配置文件
        refresh_interval: 30s  # 缩短刷新间隔，更快响应配置变化
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: ssl-blackbox:9115
      # 添加服务标签
      - source_labels: [__param_target]
        regex: 'https?://([^:]+):?(\d+)?'
        replacement: '${1}'
        target_label: hostname
      - source_labels: [__param_target]
        regex: 'https?://[^:]+:(\d+)'
        replacement: '${1}'
        target_label: port

  # Custom SSL Exporter for detailed certificate information
  # 支持热重载：每次请求 /metrics 时自动检测配置文件变更
  - job_name: 'ssl-cert-exporter'
    scrape_interval: 180s
    scrape_timeout: 120s
    static_configs:
      - targets: ['ssl-custom-exporter:9116']
    metric_relabel_configs:
      # 关键修复：将 hostname:port 组合为 instance 标签（覆盖默认的 exporter 地址）
      # 这样 AlertManager 告警中的 instance 标签就能正确匹配到 ssl_targets.json 中的目标
      - source_labels: [hostname, port]
        separator: ':'
        regex: '(.+);(.+)'
        replacement: '${1}:${2}'
        target_label: instance
      # 将 hostname:port 组合为 target_url 标签（用于告警路由）
      - source_labels: [hostname, port]
        separator: ';'
        regex: '(.+);(.+)'
        replacement: 'https://${1}:${2}'
        target_label: target_url

  # Agent Server - 拉取 Agent 采集的内网证书数据
  # Agent Server 主动拉取各 Agent 数据，聚合后提供 Prometheus 格式接口
  - job_name: 'ssl-agent-server'
    scrape_interval: 180s
    scrape_timeout: 120s
    static_configs:
      - targets: ['ssl-agent-server:8090']
    metrics_path: /metrics
    relabel_configs:
      # 添加数据来源标签，用于区分公网和内网目标
      - target_label: source
        replacement: 'agent'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
