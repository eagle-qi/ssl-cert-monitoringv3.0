# Prometheus Configuration for SSL Certificate Monitoring

global:
  scrape_interval: 60s
  evaluation_interval: 60s
  scrape_timeout: 30s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - ssl-alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "ssl_cert_alerts.yml"

# Scrape configurations
scrape_configs:
  # Blackbox Exporter - 使用 file_sd 自动发现目标
  - job_name: 'ssl-blackbox'
    metrics_path: /probe
    params:
      module: [http_ssl_cert]
    file_sd_configs:
      - files:
          - '/etc/prometheus/ssl_targets.json'
        refresh_interval: 60s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: ssl-blackbox:9115
      # 添加服务标签
      - source_labels: [__param_target]
        regex: 'https?://([^:]+):?(\d+)?'
        replacement: '${1}'
        target_label: hostname
      - source_labels: [__param_target]
        regex: 'https?://[^:]+:(\d+)'
        replacement: '${1}'
        target_label: port

  # Custom SSL Exporter for detailed certificate information
  - job_name: 'ssl-cert-exporter'
    static_configs:
      - targets: ['ssl-custom-exporter:9116']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
