services:
  # ========== Agent Server (Server-Agent 架构服务端) ==========
  # 用于接收内网 Agent 上报的证书数据，并直接监控未分配 Agent 的目标
  # 提供 Prometheus 格式接口
  agent-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ssl-agent-server
    volumes:
      - ./data:/app/data
      - ./agent/data:/app/agent_data
      # HTTPS 证书挂载（可选）
      - ./server/certs:/app/certs:ro
    environment:
      - SERVER_LISTEN_HOST=0.0.0.0
      - SERVER_LISTEN_PORT=8090
      - SERVER_HTTPS_PORT=8092
      - SERVER_CONFIG_PATH=/app/data/server_config.json
      - SERVER_DATA_PATH=/app/data/metrics.json
      - UNIFIED_TARGETS_PATH=/app/data/ssl_targets.json
      - AGENT_TARGETS_PATH=/app/agent_data/targets.json
      - EXPORTER_RELOAD_URL=http://ssl-custom-exporter:9116/reload
      # HTTPS 配置（可选）
      - ENABLE_HTTPS=${ENABLE_HTTPS:-false}
      - SSL_CERT_FILE=/app/certs/server.crt
      - SSL_KEY_FILE=/app/certs/server.key
      - SERVER_VERIFY_SSL=${SERVER_VERIFY_SSL:-false}
    dns:
      - 8.8.8.8
      - 114.114.114.114
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:8092/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - default

  prometheus:
    image: prom/prometheus:latest
    container_name: ssl-prometheus
    env_file:
      - .env
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus-data:/prometheus
      - ./data/prometheus_targets.json:/etc/prometheus/ssl_targets.json:ro
    ports:
      - "49090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - default

  grafana:
    image: grafana/grafana:latest
    container_name: ssl-grafana
    env_file:
      - .env
    ports:
      - "43000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/alerting:/etc/grafana/provisioning/alerting
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ALERTING_ENABLED=true
      - GF_ALERTING_ALERTMANAGER_FORCE_WORKER=true
      - GF_ALERTING_ALERTMANAGER_RESOLVING_TIMEOUT=1m
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: ssl-blackbox
    volumes:
      - ./exporter/blackbox.yml:/etc/blackbox_exporter/config.yml
    restart: unless-stopped

  ssl-exporter:
    build:
      context: ./exporter
      dockerfile: Dockerfile
    container_name: ssl-custom-exporter
    volumes:
      - ./exporter:/app
      - ./data:/app/data:ro
    dns:
      - 8.8.8.8
      - 114.114.114.114
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "ssl-test.local:host-gateway"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: ssl-alertmanager
    env_file:
      - .env
    volumes:
      - ./alertmanager:/etc/alertmanager
      - ./alertmanager/entrypoint.sh:/entrypoint.sh
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--log.level=debug'
    entrypoint: /bin/sh /entrypoint.sh
    restart: unless-stopped
    depends_on:
      - feishu-webhook
      - email-webhook
    networks:
      - default

  email-webhook:
    build:
      context: ./email
      dockerfile: Dockerfile
    container_name: ssl-email-webhook
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro
    environment:
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_USE_TLS=${SMTP_USE_TLS}
      - TARGETS_CONFIG_PATH=/app/data/ssl_targets.json,/app/data/agent_targets.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default

  feishu-webhook:
    build:
      context: ./feishu
      dockerfile: Dockerfile.feishu-webhook
    container_name: ssl-feishu-webhook
    env_file:
      - .env
    environment:
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL}
      - SEND_RESOLVED=${FEISHU_SEND_RESOLVED}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_AGENT_SERVER_URL: /api/agent
    container_name: ssl-dashboard
    ports:
      - "48080:80"
    depends_on:
      - captcha-service
      - agent-server
    restart: unless-stopped

  captcha-service:
    build:
      context: ./dashboard/server
      dockerfile: Dockerfile
    container_name: ssl-captcha-service
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - TARGETS_CONFIG_PATH=/app/data/ssl_targets.json
      - DASHBOARD_ADMIN_USER
      - DASHBOARD_ADMIN_PASSWORD
      - DASHBOARD_READONLY_USER
      - DASHBOARD_READONLY_PASSWORD
    restart: unless-stopped

networks:
  default:
    name: ssl-monitoring-network
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
