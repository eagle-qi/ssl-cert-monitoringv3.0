version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: ssl-prometheus
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ssl-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: ssl-blackbox
    ports:
      - "9115:9115"
    volumes:
      - ./exporter/blackbox.yml:/etc/blackbox_exporter/config.yml
    restart: unless-stopped

  ssl-exporter:
    build:
      context: ./exporter
      dockerfile: Dockerfile
    container_name: ssl-custom-exporter
    ports:
      - "9116:9116"
    volumes:
      - ./exporter:/app
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: ssl-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager:/etc/alertmanager
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
