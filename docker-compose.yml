services:
  prometheus:
    image: prom/prometheus:latest
    container_name: ssl-prometheus
    env_file:
      - .env
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus-data:/prometheus
      - ./data/prometheus_targets.json:/etc/prometheus/ssl_targets.json:ro  # Prometheus targets 配置文件
    ports:
      - "49090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - default

  grafana:
    image: grafana/grafana:latest
    container_name: ssl-grafana
    env_file:
      - .env
    ports:
      - "43000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/alerting:/etc/grafana/provisioning/alerting
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ALERTING_ENABLED=true
      - GF_ALERTING_ALERTMANAGER_FORCE_WORKER=true
      - GF_ALERTING_ALERTMANAGER_RESOLVING_TIMEOUT=1m
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: ssl-blackbox
    volumes:
      - ./exporter/blackbox.yml:/etc/blackbox_exporter/config.yml
    restart: unless-stopped

  ssl-exporter:
    build:
      context: ./exporter
      dockerfile: Dockerfile
    container_name: ssl-custom-exporter
    volumes:
      - ./exporter:/app
      - ./data:/app/data:ro  # 只读挂载配置目录
    dns:
      - 8.8.8.8
      - 114.114.114.114
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "ssl-test.local:host-gateway"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: ssl-alertmanager
    env_file:
      - .env
    volumes:
      - ./alertmanager:/etc/alertmanager
      - ./alertmanager/entrypoint.sh:/entrypoint.sh
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    entrypoint: /bin/sh /entrypoint.sh
    restart: unless-stopped
    depends_on:
      - feishu-webhook
      - email-webhook
    networks:
      - default

  email-webhook:
    build:
      context: ./email
      dockerfile: Dockerfile
    container_name: ssl-email-webhook
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro  # 只读挂载配置目录
    environment:
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_USE_TLS=${SMTP_USE_TLS}
      - TARGETS_CONFIG_PATH=/app/data/ssl_targets.json
    ports:
      - "18081:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default

  feishu-webhook:
    build:
      context: ./feishu
      dockerfile: Dockerfile.feishu-webhook
    container_name: ssl-feishu-webhook
    env_file:
      - .env
    environment:
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL}
      - SEND_RESOLVED=${FEISHU_SEND_RESOLVED}
    ports:
      - "18080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: ssl-dashboard
    ports:
      - "48080:80"
    depends_on:
      - captcha-service
    restart: unless-stopped

  captcha-service:
    build:
      context: ./dashboard/server
      dockerfile: Dockerfile
    container_name: ssl-captcha-service
    env_file:
      - .env
    volumes:
      - ./data:/app/data  # 读写挂载配置目录
    environment:
      - TARGETS_CONFIG_PATH=/app/data/ssl_targets.json  # 统一配置文件路径
      - DASHBOARD_ADMIN_USER=${DASHBOARD_ADMIN_USER}
      - DASHBOARD_ADMIN_PASSWORD=${DASHBOARD_ADMIN_PASSWORD}
    restart: unless-stopped

networks:
  default:
    name: ssl-monitoring-network
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
