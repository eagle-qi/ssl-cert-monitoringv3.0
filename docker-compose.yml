services:
  prometheus:
    image: prom/prometheus:latest
    container_name: ssl-prometheus
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus-data:/prometheus
      - ./data/prometheus_targets.json:/etc/prometheus/ssl_targets.json:ro  # Prometheus targets 配置文件
    ports:
      - "49090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ssl-grafana
    ports:
      - "43000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/alerting:/etc/grafana/provisioning/alerting
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ALERTING_ENABLED=true
      - GF_ALERTING_ALERTMANAGER_FORCE_WORKER=true
      - GF_ALERTING_ALERTMANAGER_RESOLVING_TIMEOUT=1m
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: ssl-blackbox
    volumes:
      - ./exporter/blackbox.yml:/etc/blackbox_exporter/config.yml
    restart: unless-stopped

  ssl-exporter:
    build:
      context: ./exporter
      dockerfile: Dockerfile
    container_name: ssl-custom-exporter
    volumes:
      - ./exporter:/app
      - ./data:/app/data:ro  # 只读挂载配置目录
    dns:
      - 8.8.8.8
      - 114.114.114.114
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "ssl-test.local:host-gateway"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: ssl-alertmanager
    volumes:
      - ./alertmanager:/etc/alertmanager
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: ssl-dashboard
    ports:
      - "48080:80"
    depends_on:
      - captcha-service
    restart: unless-stopped

  captcha-service:
    build:
      context: ./dashboard/server
      dockerfile: Dockerfile
    container_name: ssl-captcha-service
    volumes:
      - ./data:/app/data  # 读写挂载配置目录
    environment:
      - TARGETS_CONFIG_PATH=/app/data/ssl_targets.json  # 统一配置文件路径
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
