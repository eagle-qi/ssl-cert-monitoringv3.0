# Grafana Alerting Rules Provisioning
# Save this to: grafana/provisioning/alerting/grafana-alerting-rules.yml

apiVersion: 1

groups:
  - orgId: 1
    name: SSL证书告警组
    folder: SSL证书监控
    interval: 1m
    rules:
      # 证书检查失败告警
      - uid: ssl-check-failed
        title: SSL证书检查失败
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: ssl_cert_check_success
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              reducer: last
              expression: A
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: "SSL证书检查失败 - {{ $labels.hostname }}"
          description: "无法获取 {{ $labels.hostname }} 的SSL证书信息"
          __dashboardUid__: ssl-cert-monitoring
          __panelId__: "1"
        labels:
          severity: warning
          team: ops

      # 证书即将过期告警 (30天)
      - uid: ssl-expiring-warning
        title: SSL证书即将过期 (30天)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: (ssl_cert_not_after_timestamp - time()) / 86400 < 30 and ssl_cert_check_success == 1
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              reducer: last
              expression: A
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "SSL证书即将过期 - {{ $labels.hostname }}"
          description: "证书将在30天内过期，剩余天数: {{ $values.C }}"
          __dashboardUid__: ssl-cert-monitoring
          __panelId__: "4"
        labels:
          severity: warning
          team: ops

      # 证书严重警告 (7天)
      - uid: ssl-expiring-critical
        title: SSL证书严重警告 (7天)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: (ssl_cert_not_after_timestamp - time()) / 86400 < 7 and ssl_cert_check_success == 1
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              reducer: last
              expression: A
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "SSL证书严重警告 - {{ $labels.hostname }}"
          description: "证书将在7天内过期，请立即处理！"
          __dashboardUid__: ssl-cert-monitoring
          __panelId__: "4"
        labels:
          severity: critical
          team: ops
